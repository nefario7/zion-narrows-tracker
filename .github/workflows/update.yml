name: Update Narrows Status

on:
  schedule:
    - cron: '0 6,18 * * *'  # 6 AM and 6 PM UTC (midnight and noon MT)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest data
        run: python scripts/fetch_data.py
        env:
          NPS_API_KEY: ${{ secrets.NPS_API_KEY }}

      - name: Create PR with updated data
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update Narrows status data"
          title: "Update Narrows status data"
          body: "Automated data update from GitHub Actions"
          branch: auto-update-data
          delete-branch: true

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
