name: Auto-approve bot PRs

on:
  pull_request:

jobs:
  auto-approve:
    if: github.actor == 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
